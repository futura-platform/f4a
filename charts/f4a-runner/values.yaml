imagePullSecrets: []

global:
  startupProbe:
    periodSeconds: 5
    failureThreshold: 24
    timeoutSeconds: 3

gateway:
  name: "f4a-gateway"
  image:
    repository: "ghcr.io/futura-platform/f4a-gateway"
    pullPolicy: IfNotPresent
  replicas: 1
  startupProbe: {}
  service:
    type: ClusterIP
    port: 8080
  resources: {}

dispatch:
  name: "f4a-dispatch"
  serviceAccountName: "f4a-dispatch"
  image:
    repository: "ghcr.io/futura-platform/f4a-dispatch"
    pullPolicy: IfNotPresent
  replicas: 1
  startupProbe: {}
  metricsInterval: "5s"
  scoreEmaAlpha: "0.5"
  service:
    port: 8082
  resources: {}

worker:
  name: "f4a-worker"
  imagePullPolicy: IfNotPresent
  replicas: 1
  startupProbe: {}
  service:
    port: 8081
  # Additional Kubernetes EnvFromSource entries appended to the worker container.
  envFrom: []
  # Additional Kubernetes EnvVar entries appended to the worker container.
  env: []
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

fdb:
  clusterFile:
    # Secret containing the FDB cluster connection file
    secret:
      name: ""
      key: "fdb.cluster"
    writable:
      enabled: true
      mountPath: /etc/foundationdb
      sourceMountPath: /etc/foundationdb-source
      initImage: foundationdb/fdb-kubernetes-monitor:7.3.63
      wait:
        enabled: false
        image: busybox:1.36.1
        pollIntervalSeconds: 2
        timeoutSeconds: 600
