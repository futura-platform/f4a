apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "f4a-runner.workerName" . }}
  labels:
    {{- include "f4a-runner.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  serviceName: {{ include "f4a-runner.workerName" . }}
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      {{- include "f4a-runner.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "f4a-runner.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      {{- $clusterFileKey := include "f4a-runner.clusterFileKey" . -}}
      {{- $clusterFileSecretName := include "f4a-runner.clusterFileSecretName" . -}}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      {{- if .Values.fdb.clusterFile.writable.enabled }}
      initContainers:
        {{- include "f4a-runner.clusterFileInitContainer" (dict "Values" .Values "clusterFileKey" $clusterFileKey) | nindent 8 }}
      {{- end }}
      containers:
        - name: worker
          image: {{ .Values.worker.image | quote }}
          imagePullPolicy: {{ .Values.worker.imagePullPolicy }}
          {{- if .Values.worker.envFrom }}
          envFrom:
            {{- toYaml .Values.worker.envFrom | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.worker.service.port }}
          env:
            - name: WORKER_PORT
              value: {{ .Values.worker.service.port | quote }}
            - name: FDB_CLUSTER_FILE
              value: {{ printf "%s/%s" (ternary .Values.fdb.clusterFile.writable.mountPath .Values.fdb.clusterFile.writable.sourceMountPath .Values.fdb.clusterFile.writable.enabled) $clusterFileKey | quote }}
            {{- if .Values.worker.env }}
              {{- toYaml .Values.worker.env | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          volumeMounts:
            {{- include "f4a-runner.clusterFileVolumeMounts" (dict "Values" .Values) | nindent 12 }}
      volumes:
        {{- include "f4a-runner.clusterFileVolumes" (dict "Values" .Values "clusterFileKey" $clusterFileKey "clusterFileSecretName" $clusterFileSecretName) | nindent 8 }}
